<!doctype html>

<html lang="en">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-8CWDH2E27X"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-8CWDH2E27X");
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="RandomCollection offers curated articles about economics, finance, statistics, and coding."
    />
    <title>RandomCollection</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="/img/icon.svg"
    />

    <script src="https://cdn.plot.ly/plotly-3.5.1.min.js"></script>
    <script src="/js/head.js"></script>

    <link
      rel="stylesheet"
      href="/css/footer.css"
    />
    <link
      rel="stylesheet"
      href="/css/header.css"
    />
    <link
      rel="stylesheet"
      href="/css/index.css"
    />
    <link
      rel="stylesheet"
      href="/css/language.css"
    />
    <link
      rel="stylesheet"
      href="/css/nav.css"
    />
    <link
      rel="stylesheet"
      href="/css/theme.css"
    />
    <link
      rel="stylesheet"
      href="/css/monty_hall.css"
    />
  </head>

  <body>
    <div id="header"></div>
    <div id="nav"></div>
    <div id="language"></div>
    <div id="theme"></div>

    <main>
      <article class="section">
        <h1 data-i18n="statistics_monty_hall_title"></h1>
        <section>
          <p data-i18n="statistics_monty_hall_intro"></p>
          <p><em data-i18n="statistics_monty_hall_manual"></em></p>
        </section>
        <section>
          <p id="game-message"></p>
          <div class="doors">
            <div
              class="door"
              id="door0"
              data-i18n="statistics_monty_hall_button_door_1"
            ></div>
            <div
              class="door"
              id="door1"
              data-i18n="statistics_monty_hall_button_door_2"
            ></div>
            <div
              class="door"
              id="door2"
              data-i18n="statistics_monty_hall_button_door_3"
            ></div>
          </div>
          <div class="controls">
            <button
              onclick="resolveGame(true)"
              data-i18n="statistics_monty_hall_button_stay"
            ></button>
            <button
              onclick="resolveGame(false)"
              data-i18n="statistics_monty_hall_button_switch"
            ></button>
            <button
              onclick="startGame()"
              data-i18n="statistics_monty_hall_button_reset"
            ></button>
          </div>
        </section>
        <section>
          <p data-i18n="statistics_monty_hall_simulation"></p>
        </section>
        <section>
          <div class="controls">
            <button
              onclick="runSimulation(100)"
              data-i18n="statistics_monty_hall_button_simulation_100"
            ></button>
            <button
              onclick="runSimulation(1000)"
              data-i18n="statistics_monty_hall_button_simulation_1000"
            ></button>
          </div>
          <div id="plot"></div>
        </section>
        <section>
          <p data-i18n="statistics_monty_hall_explanation"></p>
        </section>
        <section>
          <figure class="quote">
            <blockquote data-i18n="statistics_monty_hall_quote"></blockquote>
            <figcaption
              data-i18n="statistics_monty_hall_quote_author"
            ></figcaption>
          </figure>
        </section>
      </article>
    </main>

    <div id="effect-layer"></div>

    <div id="footer"></div>

    <script src="/js/nav.js"></script>
    <script src="/js/language.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/element.js"></script>
    <script src="/js/monty_hall.js"></script>
  </body>
</html>
